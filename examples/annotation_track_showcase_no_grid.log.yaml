template:
  path: ../templates/wireline_base.template.yaml
version: 1
name: Annotation Track Showcase
render:
  output_path: ../workspace/renders/annotation_track_showcase_no_grid.pdf
  dpi: 300
  continuous_strip_page_height_mm: 297
document:
  depth_range:
    - 670
    - 720
  page:
    margin_left_mm: 0
    margin_right_mm: 8
    margin_top_mm: 0
    margin_bottom_mm: 0
    track_gap_mm: 0
    header_height_mm: 0
    track_header_height_mm: 16
    footer_height_mm: 0
  layout:
    heading:
      enabled: false
    remarks: []
    log_sections:
      - id: main
        title: Annotation Track Showcase
        subtitle: LAS-backed lithofacies intervals with descriptive notes
        data:
          source_path: ../workspace/data/CBL_Main_REV1.las
          source_format: las
        tracks:
          - id: depth
            title: Depth
            kind: reference
            width_mm: 16
            position: 1
            reference:
              axis: depth
              define_layout: true
              unit: ft
              scale_ratio: 240
              major_step: 10
              secondary_grid:
                display: true
                line_count: 5
          - id: gr
            title: GR
            kind: normal
            width_mm: 28
            position: 2
            grid:
              vertical:
                main:
                  line_count: 4
                  scale: linear
                secondary:
                  line_count: 4
                  scale: linear
          - id: lith
            title: Lithofacies / Notes
            kind: annotation
            width_mm: 38
            grid:
              horizontal:
                main:
                  visible: false
                secondary:
                  visible: false
              vertical:
                main:
                  visible: false
                secondary:
                  visible: false
            position: 3
            track_header:
              objects:
                - kind: title
                  enabled: true
                  line_units: 1
                - kind: scale
                  enabled: false
                  reserve_space: false
                - kind: legend
                  enabled: false
                  reserve_space: false
                - kind: divisions
                  enabled: false
                  reserve_space: false
            annotations:
              - kind: interval
                top: 670
                base: 688
                text: shale
                lane_start: 0.0
                lane_end: 0.32
                fill_color: "#2047a3"
                border_color: "#1a1a1a"
                text_color: "#ffffff"
                text_orientation: vertical
                font_size: 8.2
                font_weight: bold
              - kind: text
                top: 670
                base: 688
                text: |
                  Dark shale with
                  moderate GR and
                  limited clean streaks.
                lane_start: 0.36
                lane_end: 1.0
                background_color: "#dbe7ff"
                border_color: "#2047a3"
                border_linewidth: 0.5
                wrap: true
                font_size: 6.8
              - kind: interval
                top: 688
                base: 700
                text: sand
                lane_start: 0.0
                lane_end: 0.32
                fill_color: "#ffe21a"
                border_color: "#1a1a1a"
                text_color: "#111111"
                text_orientation: horizontal
                font_size: 7.6
                font_weight: bold
              - kind: text
                top: 688
                base: 700
                text: |
                  Clean sand package with
                  lower GR response and
                  sharper boundaries.
                lane_start: 0.36
                lane_end: 1.0
                background_color: "#fff6cc"
                border_color: "#8a6d00"
                border_linewidth: 0.5
                wrap: true
                font_size: 6.8
              - kind: interval
                top: 700
                base: 720
                text: shale
                lane_start: 0.0
                lane_end: 0.32
                fill_color: "#2047a3"
                border_color: "#1a1a1a"
                text_color: "#ffffff"
                text_orientation: vertical
                font_size: 8.2
                font_weight: bold
              - kind: text
                top: 700
                base: 720
                text: |
                  Laminated shale interval.
                  Suitable for longer
                  formatted zone notes.
                lane_start: 0.36
                lane_end: 1.0
                background_color: "#dbe7ff"
                border_color: "#2047a3"
                border_linewidth: 0.5
                wrap: true
                font_size: 6.6
    tail:
      enabled: false
  bindings:
    on_missing: skip
    channels:
      - section: main
        channel: GR_STGC
        track_id: gr
        kind: curve
        label: Gamma Ray (GR_STGC)
        style:
          color: "#17bf22"
          line_width: 0.85
        scale:
          kind: linear
          min: 0
          max: 150
