        label: Transit Time Overlay (TT)
        header_display:
          wrap_name: true
        style:
          color: "#2142ff"
          line_width: 0.55
        scale:
          kind: linear
          min: 200
          max: 400
          reverse: true
        reference_overlay:
          mode: curve
          lane_start: 0.06
          lane_end: 0.24
      - section: repeat
        channel: TENS
        track_id: depth_overlay
        kind: curve
        label: Tension Indicator (TENS)
        header_display:
          wrap_name: true
        style:
          color: "#111111"
          line_width: 0.55
          line_style: "--"
        scale:
          kind: linear
          min: 5000
          max: 0
        reference_overlay:
          mode: indicator
          lane_start: 0.78
          lane_end: 0.94
      - section: repeat
        channel: CBL
        track_id: depth_overlay
        kind: curve
        label: CBL > 0.5 mV
        header_display:
