template:
  path: ../templates/wireline_base.template.yaml
version: 1
name: Cased Hole Bond Evaluation Demo
render:
  output_path: ../workspace/renders/CBL_job_demo.pdf
  dpi: 300
  continuous_strip_page_height_mm: 297
  matplotlib:
    style:
      report:
        summary_label_fontsize: 8.0
        summary_value_fontsize: 10.5
        provider_fontsize: 16.0
        service_fontsize: 7.5
        field_label_fontsize: 7.0
        field_value_fontsize: 7.8
        detail_header_fontsize: 9.0
        detail_label_fontsize: 6.4
        detail_value_fontsize: 6.4
        tail_frame_y: 0.74
        tail_frame_height: 0.22
document:
  depth_range:
    - 8290
    - 8460
  page:
    margin_left_mm: 0
    margin_right_mm: 8
    margin_top_mm: 0
    margin_bottom_mm: 0
    track_gap_mm: 0
    header_height_mm: 0
    track_header_height_mm: 34
    footer_height_mm: 0
  layout:
    heading:
      enabled: true
      provider_name: Company
      general_fields:
        - key: company
          label: Company
          value: University of Utah
        - key: well
          label: Well
          value: Forge 78B-32
        - key: field
          label: Field
          value: None
        - key: county
          label: County
          value: Beaver
        - key: country
          label: Country
          value: USA
        - key: scale
          label: Scale
          value: ft 1:240
        - key: location
          label: Location
          value: "Lat: 38.500171  Long: -112.88221"
        - key: logging_date
          label: Logging Date
          value: 06-Oct-2021
        - key: top_log_interval
          label: Top Log Interval
          value: 8290.00 ft
        - key: bottom_log_interval
          label: Bottom Log Interval
          value: 8460.00 ft
        - key: fluid_type
          label: Casing Fluid Type
          value: Water
      service_titles:
        - value: Cement Bond Log
          font_size: 16
          auto_adjust: true
          bold: true
          alignment: left
        - value: Variable Density Log
          font_size: 15
          auto_adjust: true
          italic: true
          alignment: center
        - value: Primary and Repeat Review
          font_size: 14
          auto_adjust: true
          alignment: right
      detail:
        kind: cased_hole
        title: Cased Hole
        rows:
          - label: Date
            values:
              - 06-Oct-2021
              - ""
          - label_cells:
              - Run
              - Down
            columns:
              - cells: [""]
              - cells: [""]
          - label: Service Order
            values:
              - JDS-42-00090-03
              - ""
          - label: Driller Depth
            values:
              - ""
              - ""
          - label: Logged Depth
            values:
              - ""
              - ""
          - label: First Reading (Bottom)
            values:
              - ""
              - ""
          - label: Last Reading
            columns:
              - cells:
                  - 0.0
                  - ft
              - cells: [""]
          - label: Start Time
            columns:
              - cells:
                  - 12:00
                  - HS
              - cells: [""]
          - label: End Time
            columns:
              - cells:
                  - 18:00
                  - HS
              - cells: [""]
          - label: Drill Time
            columns:
              - cells:
                  - 6:00
                  - HS
              - cells: [""]
          - label: Injection Type
            values:
              - ""
              - ""
          - label: Fluid Density
            values:
              - g/L
              - ""
          - label: Fluid Salinity
            values:
              - ppm
              - ""
          - label: Fluid Level
            values:
              - ft
              - ""
          - label: Cement Top
            columns:
              - cells:
                  - 80.0
                  - ft
              - cells: [""]
          - label: Head Pressure
            values:
              - psi
              - ""
          - label: Maximum Deviation
            values:
              - degrees
              - ""
          - label: Nominal Speed
            columns:
              - cells:
                  - 12.0
                  - ft/min
              - cells: [""]
          - label: Bottom Temperature
            values:
              - ""
              - ""
          - label: Reference Log
            columns:
              - cells:
                  - Resistive
              - cells: [""]
          - label: Reference Date
            columns:
              - cells:
                  - 1-Mar-90
              - cells: [""]
          - label_cells:
              - Equipment No.
              - Base
            columns:
              - cells:
                  - HL-
                  - C. Rivadavia
              - cells: [""]
          - label: Logged By
            values:
              - ""
              - ""
          - label: Witnessed By
            values:
              - ""
              - ""
    remarks:
      - title: Demo Purpose
        lines:
          - This demo uses the real CBL main and repeat DLIS files checked into the repository.
          - The main pass combines reference overlays, curve callouts, thresholded CBL amplitude,
          - VDL density with waveform overlay, and restrained interval annotations.
          - The repeat pass preserves the same depth window and scales for direct visual comparison.
        alignment: left
      - title: Public Data and IP Notice
        lines:
          - This example uses publicly available or repository-provided demonstration data intended for educational use.
          - Rendered layouts are independent reproductions generated by wellplot, not vendor-authored originals or official service-company deliverables.
          - Original trademarks and service names remain the property of their respective owners.
          - Confirm data provenance and redistribution rights before reusing outputs outside this repository.
        alignment: left
    log_sections:
      - id: main
        title: Main Pass Review
        subtitle: Primary pass with overlays, thresholded amplitude, VDL density, and interval notes
        data:
          source_path: ../workspace/data/CBL_Main.dlis
          source_format: dlis
        tracks:
          - id: combo
            title: ""
            kind: normal
            width_mm: 48
            position: 1
            grid:
              vertical:
                main:
                  scale: linear
                  line_count: 4
                  spacing_mode: count
                secondary:
                  scale: linear
                  line_count: 5
                  spacing_mode: count
            track_header:
              objects:
                - kind: title
                  enabled: false
                  reserve_space: false
                - kind: scale
                  enabled: true
                  line_units: 1
                - kind: legend
                  enabled: true
                  line_units: 2
                - kind: divisions
                  enabled: false
                  reserve_space: false
          - id: depth_overlay
            title: ""
            kind: reference
            width_mm: 18
            position: 2
            reference:
              axis: depth
              define_layout: true
              unit: ft
              scale_ratio: 240
              major_step: 10
              secondary_grid:
                display: true
                line_count: 5
              header:
                display_unit: true
                display_scale: true
                display_annotations: false
              number_format:
                format: automatic
                precision: 0
              events:
                - depth: 8336
                  label: Transition
                  tick_side: right
                  tick_length_ratio: 0.14
                  text_side: left
                  text_x: 0.68
                  depth_offset: -1.0
                  color: "#444444"
            track_header:
              objects:
                - kind: title
                  enabled: false
                  reserve_space: false
                - kind: scale
                  enabled: true
                  line_units: 1
                - kind: legend
                  enabled: true
                  line_units: 8
                - kind: divisions
                  enabled: false
                  reserve_space: false
          - id: cbl_qc
            title: ""
            kind: normal
            width_mm: 40
            position: 3
            grid:
              vertical:
                main:
                  scale: linear
                  line_count: 4
                  spacing_mode: count
                secondary:
                  scale: linear
                  line_count: 5
                  spacing_mode: count
            track_header:
              objects:
                - kind: title
                  enabled: false
                  reserve_space: false
                - kind: scale
                  enabled: true
                  line_units: 1
                - kind: legend
                  enabled: true
                  line_units: 3
                - kind: divisions
                  enabled: false
                  reserve_space: false
          - id: vdl
            title: ""
            kind: array
            width_mm: 46
            position: 4
            x_scale:
              kind: linear
              min: 200
              max: 1200
            grid:
              vertical:
                main:
                  visible: false
                secondary:
                  visible: false
            track_header:
              objects:
                - kind: title
                  enabled: false
                  reserve_space: false
                - kind: scale
                  enabled: true
                  line_units: 1
                - kind: legend
                  enabled: true
                  line_units: 2
                - kind: divisions
                  enabled: false
                  reserve_space: false
          - id: interpretation
            title: Bond Review
            kind: annotation
            width_mm: 28
            position: 5
            grid:
              horizontal:
                main:
                  visible: false
                secondary:
                  visible: false
              vertical:
                main:
                  visible: false
                secondary:
                  visible: false
            track_header:
              objects:
                - kind: title
                  enabled: true
                  line_units: 1
                - kind: scale
                  enabled: false
                  reserve_space: false
                - kind: legend
                  enabled: false
                  reserve_space: false
                - kind: divisions
                  enabled: false
                  reserve_space: false
            annotations:
              - kind: interval
                top: 8290
                base: 8336
                text: transition
                lane_start: 0.0
                lane_end: 0.28
                fill_color: "#fde68a"
                border_color: "#a16207"
                text_color: "#111111"
                text_orientation: vertical
                font_size: 7.6
                font_weight: bold
              - kind: text
                top: 8290
                base: 8336
                text: |
                  Higher CBL response near the top
                  of the review window. Keep both
                  raw and filtered curves visible
                  for QC.
                lane_start: 0.26
                lane_end: 1.0
                background_color: "#fff7d6"
                border_color: "#a16207"
                border_linewidth: 0.5
                wrap: true
                font_size: 5.9
              - kind: interval
                top: 8336
                base: 8460
                text: low amp
                lane_start: 0.0
                lane_end: 0.28
                fill_color: "#dbeafe"
                border_color: "#2563eb"
                text_color: "#0f172a"
                text_orientation: vertical
                font_size: 7.5
                font_weight: bold
              - kind: text
                top: 8336
                base: 8460
                text: |
                  Lower CBL amplitude and quieter
                  VDL texture through most of the
                  interval. The repeat pass below
                  keeps the same scales for direct
                  comparison.
                lane_start: 0.26
                lane_end: 1.0
                background_color: "#eff6ff"
                border_color: "#2563eb"
                border_linewidth: 0.5
                wrap: true
                font_size: 5.8
      - id: repeat
        title: Repeat Pass
        subtitle: Independent DLIS source rendered on the same depth window and scales
        data:
          source_path: ../workspace/data/CBL_Repeat.dlis
          source_format: dlis
        tracks:
          - id: combo
            title: ""
            kind: normal
            width_mm: 48
            position: 1
            grid:
              vertical:
                main:
                  scale: linear
                  line_count: 4
                  spacing_mode: count
                secondary:
                  scale: linear
                  line_count: 5
                  spacing_mode: count
            track_header:
              objects:
                - kind: title
                  enabled: false
                  reserve_space: false
                - kind: scale
                  enabled: true
                  line_units: 1
                - kind: legend
                  enabled: true
                  line_units: 2
                - kind: divisions
                  enabled: false
                  reserve_space: false
          - id: depth_overlay
            title: ""
            kind: reference
            width_mm: 18
            position: 2
            reference:
              axis: depth
              define_layout: true
              unit: ft
              scale_ratio: 240
              major_step: 10
              secondary_grid:
                display: true
                line_count: 5
              header:
                display_unit: true
                display_scale: true
                display_annotations: false
              number_format:
                format: automatic
                precision: 0
              events:
                - depth: 8336
                  label: Transition
                  tick_side: right
                  tick_length_ratio: 0.14
                  text_side: left
                  text_x: 0.68
                  depth_offset: -1.0
                  color: "#444444"
            track_header:
              objects:
                - kind: title
                  enabled: false
                  reserve_space: false
                - kind: scale
                  enabled: true
                  line_units: 1
                - kind: legend
                  enabled: true
                  line_units: 8
                - kind: divisions
                  enabled: false
                  reserve_space: false
          - id: cbl_qc
            title: ""
            kind: normal
            width_mm: 40
            position: 3
            grid:
