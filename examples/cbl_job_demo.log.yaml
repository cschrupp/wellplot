              max: 1200
            grid:
              vertical:
                main:
                  visible: false
                secondary:
                  visible: false
            track_header:
              objects:
                - kind: title
                  enabled: false
                  reserve_space: false
                - kind: scale
                  enabled: true
                  line_units: 1
                - kind: legend
                  enabled: true
                  line_units: 2
                - kind: divisions
                  enabled: false
                  reserve_space: false
    tail:
      enabled: true
  bindings:
    on_missing: skip
    channels:
      - section: main
        channel: ECGR_STGC
        track_id: combo
        kind: curve
        label: Gamma Ray (ECGR_STGC) QTGC-B
        style:
          color: "#16a34a"
          line_width: 0.8
        scale:
          kind: linear
          min: 0
          max: 150
        callouts:
          - depth: 8310
            label: GR
            side: left
            text_x: 0.34
            depth_offset: -2
            font_size: 9.5
      - section: main
        channel: TT
        track_id: combo
        kind: curve
        label: Transit Time for CBL (TT) QSLT-B
        style:
          color: "#2142ff"
          line_width: 0.75
        scale:
          kind: linear
          min: 200
          max: 400
          reverse: true
        callouts:
          - depth: 8338
            label: TT
            side: right
            text_x: 0.48
            depth_offset: -2
            font_size: 9.5
      - section: main
        channel: TENS
        track_id: combo
        kind: curve
        label: Cable Tension (TENS)
        style:
          color: "#111111"
          line_width: 0.65
          line_style: "--"
        scale:
          kind: linear
          min: 5000
          max: 0
        callouts:
          - depth: 8446
            label: TENS
            side: right
            text_x: 0.84
            depth_offset: -2
            font_size: 9.0
      - section: main
        channel: TT
        track_id: depth_overlay
        kind: curve
        label: Transit Time Overlay (TT)
        header_display:
          wrap_name: true
        style:
          color: "#2142ff"
          line_width: 0.55
        scale:
          kind: linear
          min: 200
          max: 400
          reverse: true
        reference_overlay:
          mode: curve
          lane_start: 0.06
          lane_end: 0.24
        callouts:
          - depth: 8338
            label: TT
            side: right
            text_x: 0.28
            font_size: 8.5
      - section: main
        channel: TENS
        track_id: depth_overlay
        kind: curve
        label: Tension Indicator (TENS)
        header_display:
          wrap_name: true
        style:
          color: "#111111"
          line_width: 0.55
          line_style: "--"
        scale:
          kind: linear
          min: 5000
          max: 0
        reference_overlay:
          mode: indicator
          lane_start: 0.78
          lane_end: 0.94
        callouts:
          - depth: 8446
            label: TENS
            side: left
            text_x: 0.72
            font_size: 8.5
      - section: main
        channel: CBL
        track_id: depth_overlay
        kind: curve
        label: CBL > 0.5 mV
        header_display:
          wrap_name: true
        style:
          color: "#334155"
          line_width: 0.55
        scale:
          kind: linear
          min: 0
          max: 2
        reference_overlay:
          mode: ticks
          tick_side: left
          tick_length_ratio: 0.08
          threshold: 0.5
      - section: main
        channel: CBL
        track_id: cbl_qc
        kind: curve
        label: CBL Amplitude (Raw)
        header_display:
          wrap_name: true
        style:
          color: "#111111"
          line_width: 0.75
        scale:
          kind: linear
          min: 0
          max: 2
        fill:
          kind: baseline_split
          label: 0.5 mV threshold
          alpha: 0.55
          baseline:
            value: 0.5
            lower_color: "#dcfce7"
            upper_color: "#fee2e2"
            line_color: "#111111"
            line_width: 0.6
            line_style: "--"
      - section: main
        channel: CBLF
        track_id: cbl_qc
        kind: curve
        label: CBL Filtered (CBLF)
        header_display:
          wrap_name: true
        style:
          color: "#2563eb"
          line_width: 0.65
          line_style: "--"
        scale:
          kind: linear
          min: 0
          max: 2
      - section: main
        channel: VDL
        track_id: vdl
        kind: raster
        label: VDL VariableDensity (VDL) QSLT-B
        profile: vdl
        normalization: auto
        waveform_normalization: trace_maxabs
        style:
          colormap: gray_r
        show_raster: true
        raster_alpha: 1.0
        colorbar:
          enabled: true
          label: Amplitude
          position: header
        sample_axis:
          enabled: false
          unit: us
          source_origin: 40
          source_step: 10
          min: 200
          max: 1200
          ticks: 7
        waveform:
          enabled: true
          stride: 6
          amplitude_scale: 0.28
          line_width: 0.16
          color: "#4a4a4a"
      - section: repeat
        channel: ECGR_STGC
        track_id: combo
        kind: curve
        label: Gamma Ray (ECGR_STGC) QTGC-B
        style:
          color: "#16a34a"
          line_width: 0.8
        scale:
          kind: linear
          min: 0
          max: 150
      - section: repeat
