template:
  path: ../templates/wireline_base.template.yaml
version: 1
name: CBL Log Example Attempt
render:
  output_path: ../workspace/renders/CBL_log_attempt.pdf
  dpi: 300
  continuous_strip_page_height_mm: 297
document:
  layout:
    heading:
      enabled: true
    remarks:
      - title: Public Data and IP Notice
        lines:
          - This example uses publicly available or repository-provided demonstration data intended for educational use.
          - Rendered layouts are independent reproductions generated by wellplot, not vendor-authored originals or official service-company deliverables.
          - Original trademarks and service names remain the property of their respective owners.
          - Confirm data provenance and redistribution rights before reusing outputs outside this repository.
        alignment: left
    log_sections:
      - id: main
        title: Main Log
        subtitle: CBL Service
        data:
          source_path: ../workspace/data/CBL_Main_REV1.las
          source_format: las
        tracks:
          - id: combo_gr_tt
            title: GR_STGC / TT
            kind: normal
            width_mm: 28
            position: 1
            grid:
              vertical:
                main:
                  line_count: 4
                  scale: linear
                secondary:
                  line_count: 4
                  scale: linear
          - id: depth
            title: Depth
            kind: reference
            width_mm: 16
            position: 2
            reference:
              axis: depth
              define_layout: true
              unit: m
              scale_ratio: 200
              major_step: 50
              secondary_grid:
                display: true
                line_count: 5
          - id: cbl
            title: CBL [MV]
            kind: normal
            width_mm: 28
            position: 3
            grid:
              vertical:
                main:
                  line_count: 4
                  scale: exponential
                  spacing_mode: scale
                secondary:
                  line_count: 4
                  scale: exponential
                  spacing_mode: scale
            track_header:
              objects:
                - kind: title
                  enabled: true
                  line_units: 1
                - kind: scale
                  enabled: true
                  line_units: 1
                - kind: legend
                  enabled: true
                  line_units: 2
                - kind: divisions
                  enabled: true
                  reserve_space: true
                  line_units: 1
          - id: bi
            title: BI
            kind: normal
            width_mm: 28
            position: 4
            grid:
              vertical:
                main:
                  line_count: 4
                  scale: tangential
                secondary:
                  line_count: 4
                  scale: tangential
          - id: mtem
            title: MTEM
            kind: normal
            width_mm: 28
            position: 5
      - id: repeat
        title: Repeat Log
        subtitle: CBL Repeat
        data:
          source_path: ../workspace/data/CBL_Repeat_REV1.las
          source_format: las
        tracks:
          - id: combo_gr_tt
            title: GR_STGC / TT
            kind: normal
            width_mm: 28
            position: 1
            grid:
              vertical:
                main:
                  line_count: 4
                  scale: linear
                secondary:
                  line_count: 4
                  scale: linear
          - id: depth
            title: Depth
            kind: reference
            width_mm: 16
            position: 2
            reference:
              axis: depth
              define_layout: true
              unit: m
              scale_ratio: 200
              major_step: 50
              secondary_grid:
                display: true
                line_count: 5
          - id: cbl
            title: CBL [MV]
            kind: normal
            width_mm: 28
            position: 3
            grid:
              vertical:
                main:
                  line_count: 4
                  scale: exponential
                  spacing_mode: scale
                secondary:
                  line_count: 4
                  scale: exponential
                  spacing_mode: scale
            track_header:
              objects:
                - kind: title
                  enabled: true
                  line_units: 1
                - kind: scale
                  enabled: true
                  line_units: 1
                - kind: legend
                  enabled: true
                  line_units: 2
                - kind: divisions
                  enabled: true
                  reserve_space: true
                  line_units: 1
          - id: bi
            title: BI
            kind: normal
            width_mm: 28
            position: 4
            grid:
              vertical:
                main:
                  line_count: 4
                  scale: tangential
                secondary:
                  line_count: 4
                  scale: tangential
          - id: mtem
            title: MTEM
            kind: normal
            width_mm: 28
            position: 5
    tail:
      enabled: true
  bindings:
    on_missing: skip
    channels:
      - section: main
        channel: GR_STGC
        track_id: combo_gr_tt
        kind: curve
        style:
          color: "#2e7d32"
        scale:
          kind: linear
          min: 0
          max: 150
        render_mode: value_labels
        value_labels:
          step: 10
          format: fixed
          precision: 1
          font_size: 6.0
          horizontal_alignment: center
      - section: main
        channel: TT
        track_id: combo_gr_tt
        kind: curve
        style:
          color: "#1e40af"
        scale:
          kind: linear
          min: 400
          max: 200
          reverse: true
      - section: main
        channel: CBL
        track_id: cbl
        kind: curve
        style:
          color: "#424242"
        scale:
          kind: linear
          min: 0
          max: 100
      - section: main
        channel: BI
        track_id: bi
        kind: curve
        style:
          color: "#8d6e63"
        scale:
          kind: tangential
          min: 0
          max: 5000
      - section: main
        channel: MTEM
        track_id: mtem
        kind: curve
        style:
          color: "#111827"
      - section: repeat
        channel: GR_STGC
        track_id: combo_gr_tt
        kind: curve
        style:
          color: "#2e7d32"
        scale:
          kind: linear
          min: 0
          max: 150
      - section: repeat
        channel: TT
        track_id: combo_gr_tt
        kind: curve
        style:
          color: "#1e40af"
        scale:
          kind: linear
          min: 400
          max: 200
          reverse: true
      - section: repeat
        channel: CBL
        track_id: cbl
        kind: curve
        style:
          color: "#424242"
        scale:
          kind: linear
          min: 0
          max: 100
