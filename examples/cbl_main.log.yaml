template:
  path: ../templates/wireline_base.template.yaml
version: 1
name: CBL Main Configuration
data:
  source_path: ../workspace/data/CBL_Main_REV1.las
  source_format: auto
render:
  output_path: ../workspace/renders/CBL_Main_REV1_render.pdf
  dpi: 300
  matplotlib:
    style:
      track_header:
        separator_linewidth: 0.4
      markers:
        callout_fontsize: 6.2
auto_tracks:
  max_tracks: 5
  tracks:
    - channel: CBL
      configure:
        id: cbl
        style:
          color: "#1b5e20"
    - channel: VDL
      configure:
        id: vdl
        style:
          color: "#0d47a1"
    - channel: GR
      configure:
        id: gr
        style:
          color: "#b71c1c"
    - channel: CALI
      configure:
        id: cali
        style:
          color: "#4a148c"
    - channel: RT
      configure:
        id: rt
        style:
          color: "#e65100"
