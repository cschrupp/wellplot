template:
  path: ../templates/wireline_base.template.yaml
version: 1
name: Curve Callouts Showcase
render:
  output_path: ../workspace/renders/curve_callouts_showcase.pdf
  dpi: 300
  continuous_strip_page_height_mm: 297
document:
  depth_range:
    - 670
    - 720
  page:
    margin_left_mm: 0
    margin_right_mm: 8
    margin_top_mm: 0
    margin_bottom_mm: 0
    track_gap_mm: 0
    header_height_mm: 0
    track_header_height_mm: 28
    footer_height_mm: 0
  layout:
    heading:
      enabled: false
    remarks:
      - title: Public Data and IP Notice
        lines:
          - This example uses publicly available or repository-provided demonstration data intended for educational use.
          - Rendered layouts are independent reproductions generated by wellplot, not vendor-authored originals or official service-company deliverables.
          - Original trademarks and service names remain the property of their respective owners.
          - Confirm data provenance and redistribution rights before reusing outputs outside this repository.
        alignment: left
    log_sections:
      - id: main
        title: Curve Callouts Showcase
        subtitle: Curve labels anchored to real track positions
        data:
          source_path: ../workspace/data/CBL_Main.dlis
          source_format: dlis
        tracks:
          - id: combo
            title: ""
            kind: normal
            width_mm: 56
            position: 1
            grid:
              vertical:
                main:
                  scale: linear
                  line_count: 4
                  spacing_mode: count
                secondary:
                  scale: linear
                  line_count: 5
                  spacing_mode: count
            track_header:
              objects:
                - kind: title
                  enabled: false
                  reserve_space: false
                - kind: scale
                  enabled: true
                  line_units: 1
                - kind: legend
                  enabled: true
                  line_units: 2
                - kind: divisions
                  enabled: false
                  reserve_space: false
          - id: depth
            title: ""
            kind: reference
            width_mm: 14
            position: 2
            reference:
              axis: depth
              define_layout: true
              unit: ft
              scale_ratio: 240
              major_step: 10
              secondary_grid:
                display: true
                line_count: 5
              header:
                display_unit: true
                display_scale: true
                display_annotations: false
              number_format:
                format: automatic
                precision: 0
            track_header:
              objects:
                - kind: title
                  enabled: false
                  reserve_space: false
                - kind: scale
                  enabled: true
                  line_units: 1
                - kind: legend
                  enabled: false
                  reserve_space: false
                - kind: divisions
                  enabled: false
                  reserve_space: false
          - id: cbl
            title: ""
            kind: normal
            width_mm: 56
            position: 3
            grid:
              vertical:
                main:
                  scale: linear
                  line_count: 2
                  spacing_mode: count
                secondary:
                  scale: linear
                  line_count: 5
                  spacing_mode: count
            track_header:
              objects:
                - kind: title
                  enabled: false
                  reserve_space: false
                - kind: scale
                  enabled: true
                  line_units: 1
                - kind: legend
                  enabled: true
                  line_units: 2
                - kind: divisions
                  enabled: false
                  reserve_space: false
          - id: vdl
            title: ""
            kind: array
            width_mm: 58
            position: 4
            x_scale:
              kind: linear
              min: 200
              max: 1200
            grid:
              vertical:
                main:
                  scale: linear
                  line_count: 2
                  spacing_mode: count
                secondary:
                  visible: false
            track_header:
              objects:
                - kind: title
                  enabled: false
                  reserve_space: false
                - kind: scale
                  enabled: true
                  line_units: 1
                - kind: legend
                  enabled: true
                  line_units: 2
                - kind: divisions
                  enabled: false
                  reserve_space: false
    tail:
      enabled: false
  bindings:
    on_missing: skip
    channels:
      - section: main
        channel: ECGR_STGC
        track_id: combo
        kind: curve
        label: Gamma Ray (ECGR_STGC) QTGC-B
        style:
          color: "#17bf22"
          line_width: 0.85
        scale:
          kind: linear
          min: 0
          max: 150
        callouts:
          - depth: 714
            label: ECGR_STGC
            side: left
            text_x: 0.34
            depth_offset: 3
            font_size: 11.0
      - section: main
        channel: TT
        track_id: combo
        kind: curve
        label: Transit Time for CBL (TT) QSLT-B
        style:
          color: "#1238ff"
          line_width: 0.8
        scale:
          kind: linear
          min: 200
          max: 400
          reverse: true
        callouts:
          - depth: 710
            label: TT
            side: right
            text_x: 0.50
            depth_offset: -4
            font_size: 11.0
      - section: main
        channel: TENS
        track_id: combo
        kind: curve
        label: Cable Tension (TENS)
        style:
          color: "#111111"
          line_width: 0.7
          line_style: "--"
        scale:
          kind: linear
          min: 0
          max: 5000
          reverse: true
        callouts:
          - depth: 691
            label: TENS
            side: right
            text_x: 0.84
            depth_offset: -2
            font_size: 10.5
      - section: main
        channel: MTEM
        track_id: combo
        kind: curve
        label: Mud Temperature (MTEM) LEH-MT
        style:
          color: "#111111"
          line_width: 1.0
        scale:
          kind: linear
          min: 100
          max: 500
        callouts:
          - depth: 681
            label: MTEM
            side: left
            text_x: 0.16
            depth_offset: -2
            font_size: 10.5
      - section: main
        channel: CBL
        track_id: cbl
        kind: curve
        label: CBL Amplitude (CBL) QSLT-B
        style:
          color: "#111111"
          line_width: 0.75
        scale:
          kind: linear
          min: 0
          max: 100
        callouts:
          - depth: 720
            label: CBL
            side: right
            text_x: 0.83
            depth_offset: -2
            font_size: 11.0
      - section: main
        channel: VDL
        track_id: vdl
        kind: raster
        label: VDL VariableDensity (VDL) QSLT-B
        profile: vdl
        normalization: auto
        waveform_normalization: trace_maxabs
        style:
          colormap: gray_r
        show_raster: true
        raster_alpha: 1.0
        colorbar:
          enabled: true
          position: header
        sample_axis:
          enabled: true
          unit: us
          min: 200
          max: 1200
          source_origin: 40
          source_step: 10
