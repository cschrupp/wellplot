template:
  path: ./base.template.yaml
version: 1
name: 30-23a-3 Density-Neutron Reconstruction
render:
  output_path: ../../../workspace/renders/30-23a-3_8117_porosity_reconstruction.pdf
document:
  layout:
    remarks:
      - title: Template Retained
        lines:
          - This production example keeps the existing report template and swaps in the replacement LAS.
          - Heading fields resolve from the LAS well header instead of the removed Forge placeholders.
          - The strip layout now uses the density-neutron and resistivity curves that are actually present.
        alignment: left
      - title: Data Source
        lines:
          - "Source: workspace/data/30-23a-3 8117_d.las"
          - "Displayed windows: 8400 to 9300 ft and 9300 to 10200 ft."
          - "Curves plotted: GR, SP, ILD, ILM, MSFL, NPHI, RHOB, PEF, and DRHO."
        alignment: left
      - title: Supported Window Choice
        lines:
          - The upper window starts where the replacement file has stable deep resistivity and density-neutron coverage.
          - The lower window reuses the same LAS to extend the review toward total depth without changing the packet template.
          - The page scale remains 1:240 ft to match the original production-example layout.
        alignment: left
    log_sections:
      - id: upper_review
        title: Upper Open-Hole Review
        subtitle: 30-23a-3 8117_d.las
        depth_range:
          - 8400
          - 9300
        data:
          source_path: "../../../workspace/data/30-23a-3 8117_d.las"
          source_format: las
        tracks:
          - id: gr_sp
            title: ""
            kind: normal
            width_mm: 38
            position: 1
            grid:
              vertical:
                main:
                  scale: linear
                  line_count: 4
                  spacing_mode: count
                secondary:
                  scale: linear
                  line_count: 5
                  spacing_mode: count
            track_header:
              objects:
                - kind: title
                  enabled: false
                  reserve_space: false
                - kind: scale
                  enabled: true
                  line_units: 1
                - kind: legend
                  enabled: true
                  line_units: 3
                - kind: divisions
                  enabled: false
                  reserve_space: false
          - id: depth
            title: ""
            kind: reference
            width_mm: 20
            position: 2
            reference:
              axis: depth
              define_layout: true
              unit: ft
              scale_ratio: 240
              major_step: 10
              secondary_grid:
                display: true
                line_count: 5
              header:
                display_unit: true
                display_scale: true
                display_annotations: false
              number_format:
                format: automatic
                precision: 0
            track_header:
              objects:
                - kind: title
                  enabled: false
                  reserve_space: false
                - kind: scale
                  enabled: true
                  line_units: 1
                - kind: legend
                  enabled: true
                  line_units: 2
                - kind: divisions
                  enabled: false
                  reserve_space: false
          - id: resistivity
            title: ""
            kind: normal
            width_mm: 40
            position: 3
            grid:
              vertical:
                main:
                  scale: linear
                  line_count: 4
                  spacing_mode: count
                secondary:
                  scale: linear
                  line_count: 5
                  spacing_mode: count
            track_header:
              objects:
                - kind: title
                  enabled: false
                  reserve_space: false
                - kind: scale
                  enabled: true
                  line_units: 1
                - kind: legend
                  enabled: true
                  line_units: 3
                - kind: divisions
                  enabled: false
                  reserve_space: false
          - id: porosity
            title: ""
            kind: normal
            width_mm: 48
            position: 4
            grid:
              vertical:
                main:
                  scale: linear
                  line_count: 4
                  spacing_mode: count
                secondary:
                  scale: linear
                  line_count: 5
                  spacing_mode: count
            track_header:
              objects:
                - kind: title
                  enabled: false
                  reserve_space: false
                - kind: scale
                  enabled: true
                  line_units: 1
                - kind: legend
                  enabled: true
                  line_units: 5
                - kind: divisions
                  enabled: false
                  reserve_space: false
      - id: lower_review
        title: Lower Open-Hole Review
        subtitle: 30-23a-3 8117_d.las
        depth_range:
          - 9300
          - 10200
        data:
          source_path: "../../../workspace/data/30-23a-3 8117_d.las"
          source_format: las
        tracks:
          - id: gr_sp
            title: ""
            kind: normal
            width_mm: 38
            position: 1
            grid:
              vertical:
                main:
                  scale: linear
                  line_count: 4
                  spacing_mode: count
                secondary:
                  scale: linear
                  line_count: 5
                  spacing_mode: count
            track_header:
              objects:
                - kind: title
                  enabled: false
                  reserve_space: false
                - kind: scale
                  enabled: true
                  line_units: 1
                - kind: legend
                  enabled: true
                  line_units: 3
                - kind: divisions
                  enabled: false
                  reserve_space: false
          - id: depth
            title: ""
            kind: reference
            width_mm: 20
            position: 2
            reference:
              axis: depth
              define_layout: true
              unit: ft
              scale_ratio: 240
              major_step: 10
              secondary_grid:
                display: true
                line_count: 5
              header:
                display_unit: true
                display_scale: true
                display_annotations: false
              number_format:
                format: automatic
                precision: 0
            track_header:
              objects:
                - kind: title
                  enabled: false
                  reserve_space: false
                - kind: scale
                  enabled: true
                  line_units: 1
                - kind: legend
                  enabled: true
                  line_units: 2
                - kind: divisions
                  enabled: false
                  reserve_space: false
          - id: resistivity
            title: ""
            kind: normal
            width_mm: 40
            position: 3
            grid:
              vertical:
                main:
                  scale: linear
                  line_count: 4
                  spacing_mode: count
                secondary:
                  scale: linear
                  line_count: 5
                  spacing_mode: count
            track_header:
              objects:
                - kind: title
                  enabled: false
                  reserve_space: false
                - kind: scale
                  enabled: true
                  line_units: 1
                - kind: legend
                  enabled: true
                  line_units: 3
                - kind: divisions
                  enabled: false
                  reserve_space: false
          - id: porosity
            title: ""
            kind: normal
            width_mm: 48
            position: 4
            grid:
              vertical:
                main:
                  scale: linear
                  line_count: 4
                  spacing_mode: count
                secondary:
                  scale: linear
                  line_count: 5
                  spacing_mode: count
            track_header:
              objects:
                - kind: title
                  enabled: false
                  reserve_space: false
                - kind: scale
                  enabled: true
                  line_units: 1
                - kind: legend
                  enabled: true
                  line_units: 5
                - kind: divisions
                  enabled: false
                  reserve_space: false
  bindings:
    channels:
      - section: upper_review
        channel: GR
        track_id: gr_sp
        kind: curve
        label: Gamma Ray (GR)
        header_display:
          wrap_name: true
        style:
          color: "#16a34a"
          line_width: 0.8
        scale:
          kind: linear
          min: 0
          max: 150
        fill:
          kind: to_lower_limit
          label: Gamma Fill
          color: "#8fd19e"
          alpha: 0.22
      - section: upper_review
        channel: SP
        track_id: gr_sp
        kind: curve
        label: Spontaneous Potential (SP)
        header_display:
          wrap_name: true
        style:
          color: "#8b5e3c"
          line_width: 0.65
          line_style: "--"
        scale:
          kind: linear
          min: -60
          max: 80
      - section: upper_review
        channel: ILD
        track_id: resistivity
        kind: curve
        label: Deep Induction (ILD)
        header_display:
          wrap_name: true
        style:
          color: "#111111"
          line_width: 0.75
        scale:
          kind: log
          min: 0.2
          max: 2000
      - section: upper_review
        channel: ILM
        track_id: resistivity
        kind: curve
        label: Medium Induction (ILM)
        header_display:
          wrap_name: true
        style:
          color: "#2142ff"
          line_width: 0.70
          line_style: "--"
        scale:
          kind: log
          min: 0.2
          max: 2000
      - section: upper_review
        channel: MSFL
        track_id: resistivity
        kind: curve
        label: Microspherically Focused (MSFL)
        header_display:
          wrap_name: true
        style:
          color: "#c62828"
          line_width: 0.70
          line_style: "-."
        scale:
          kind: log
          min: 0.2
          max: 2000
      - section: upper_review
        channel: NPHI
        track_id: porosity
        kind: curve
        id: nphi_overlay
        label: Neutron Porosity (NPHI)
        header_display:
          wrap_name: true
        style:
          color: "#2142ff"
          line_width: 0.75
        scale:
          kind: linear
          min: -5
          max: 45
          reverse: true
        fill:
          kind: between_instances
          other_element_id: rhob_overlay
          label: Gas Crossover
          color: "#d1d5db"
          alpha: 0.18
          crossover:
            enabled: true
            left_color: "#bfdbfe"
            right_color: "#fbbf24"
            alpha: 0.28
      - section: upper_review
        channel: RHOB
        track_id: porosity
        kind: curve
        id: rhob_overlay
        label: Bulk Density (RHOB)
        header_display:
          wrap_name: true
        style:
          color: "#111111"
          line_width: 0.75
        scale:
          kind: linear
          min: 1.95
          max: 2.95
      - section: upper_review
        channel: PEF
        track_id: porosity
        kind: curve
        label: Photoelectric Factor (PEF)
        header_display:
          wrap_name: true
        style:
          color: "#d97706"
          line_width: 0.70
          line_style: "--"
        scale:
          kind: linear
          min: 0
          max: 10
      - section: upper_review
        channel: DRHO
        track_id: porosity
        kind: curve
        label: Density Correction (DRHO)
        header_display:
          wrap_name: true
        style:
          color: "#6b7280"
          line_width: 0.65
          line_style: ":"
        scale:
          kind: linear
          min: -0.10
          max: 0.25
      - section: lower_review
