template:
  path: ../templates/wireline_base.template.yaml
version: 1
name: Reference Track Overlays Showcase
render:
  output_path: ../workspace/renders/reference_track_overlays.pdf
  dpi: 300
  continuous_strip_page_height_mm: 297
document:
  depth_range:
    - 670
    - 720
  page:
    margin_left_mm: 0
    margin_right_mm: 8
    margin_top_mm: 0
    margin_bottom_mm: 0
    track_gap_mm: 0
    header_height_mm: 0
    track_header_height_mm: 28
    footer_height_mm: 0
  layout:
    heading:
      enabled: false
    comments: []
    log_sections:
      - id: main
        title: Reference Track Overlays Showcase
        subtitle: Scalar overlays inside the layout-defining reference track
        data:
          source_path: ../workspace/data/CBL_Main.dlis
          source_format: dlis
        tracks:
          - id: combo
            title: ""
            kind: normal
            width_mm: 52
            position: 1
            grid:
              vertical:
                main:
                  scale: linear
                  line_count: 4
                  spacing_mode: count
                secondary:
                  scale: linear
                  line_count: 5
                  spacing_mode: count
            track_header:
              objects:
                - kind: title
                  enabled: false
                  reserve_space: false
                - kind: scale
                  enabled: true
                  line_units: 1
                - kind: legend
                  enabled: true
                  line_units: 2
                - kind: divisions
                  enabled: false
                  reserve_space: false
          - id: depth_overlay
            title: ""
            kind: reference
            width_mm: 20
            position: 2
            reference:
              axis: depth
              define_layout: true
              unit: ft
              scale_ratio: 240
              major_step: 10
              secondary_grid:
                display: true
                line_count: 5
              header:
                display_unit: true
                display_scale: true
                display_annotations: false
              number_format:
                format: automatic
                precision: 0
              values_orientation: horizontal
              events:
                - depth: 678
                  label: Casing Foot
                  tick_side: right
                  tick_length_ratio: 0.14
                  text_side: left
                  text_x: 0.68
                  depth_offset: -1.5
                  color: "#222222"
                - depth: 718
                  label: Readings Start
                  tick_side: left
                  tick_length_ratio: 0.14
                  text_side: right
                  text_x: 0.08
                  depth_offset: -1.0
                  color: "#444444"
            track_header:
              objects:
                - kind: title
                  enabled: false
                  reserve_space: false
                - kind: scale
                  enabled: true
                  line_units: 1
                - kind: legend
                  enabled: true
                  line_units: 6
                - kind: divisions
                  enabled: false
                  reserve_space: false
          - id: cbl
            title: ""
            kind: normal
            width_mm: 48
            position: 3
            grid:
              vertical:
                main:
                  scale: linear
                  line_count: 2
                  spacing_mode: count
                secondary:
                  scale: linear
                  line_count: 5
                  spacing_mode: count
            track_header:
              objects:
                - kind: title
                  enabled: false
                  reserve_space: false
                - kind: scale
                  enabled: true
                  line_units: 1
                - kind: legend
                  enabled: true
                  line_units: 2
                - kind: divisions
                  enabled: false
                  reserve_space: false
          - id: vdl
            title: ""
            kind: array
            width_mm: 58
            position: 4
            x_scale:
              kind: linear
              min: 200
              max: 1200
            grid:
              vertical:
                main:
                  scale: linear
                  line_count: 2
                  spacing_mode: count
                secondary:
                  visible: false
            track_header:
              objects:
                - kind: title
                  enabled: false
                  reserve_space: false
                - kind: scale
                  enabled: true
                  line_units: 1
                - kind: legend
                  enabled: true
                  line_units: 2
                - kind: divisions
                  enabled: false
                  reserve_space: false
    tail:
      enabled: false
  bindings:
    on_missing: skip
    channels:
      - section: main
        channel: ECGR_STGC
        track_id: combo
        kind: curve
        label: Gamma Ray (ECGR_STGC) QTGC-B
        style:
          color: "#17bf22"
          line_width: 0.85
        scale:
          kind: linear
          min: 0
          max: 150
      - section: main
        channel: TT
        track_id: combo
        kind: curve
        label: Transit Time for CBL (TT) QSLT-B
        style:
          color: "#1238ff"
          line_width: 0.8
        scale:
          kind: linear
          min: 200
          max: 400
          reverse: true
      - section: main
        channel: TENS
        track_id: combo
        kind: curve
        label: Cable Tension (TENS)
        style:
          color: "#111111"
          line_width: 0.7
          line_style: "--"
        scale:
          kind: linear
          min: 0
          max: 5000
          reverse: true
      - section: main
        channel: TT
        track_id: depth_overlay
        kind: curve
        label: Transit Time Overlay (TT)
        style:
          color: "#1238ff"
          line_width: 0.6
        scale:
          kind: linear
          min: 200
          max: 400
          reverse: true
        reference_overlay:
          mode: curve
          lane_start: 0.06
          lane_end: 0.24
        callouts:
          - depth: 709
            label: TT
            side: right
            text_x: 0.28
            font_size: 10.5
      - section: main
        channel: TENS
        track_id: depth_overlay
        kind: curve
        label: Tension Indicator (TENS)
        style:
          color: "#111111"
          line_width: 0.6
          line_style: "--"
        scale:
          kind: linear
          min: 0
          max: 5000
          reverse: true
        reference_overlay:
          mode: indicator
          lane_start: 0.78
          lane_end: 0.94
        callouts:
          - depth: 691
            label: TENS
            side: left
            text_x: 0.72
            font_size: 10.5
      - section: main
        channel: CBL
        track_id: depth_overlay
        kind: curve
        label: CBL Event Ticks
        style:
          color: "#222222"
          line_width: 0.7
        scale:
          kind: linear
          min: 0
          max: 140
        reference_overlay:
          mode: ticks
          tick_side: left
          tick_length_ratio: 0.08
          threshold: 100
      - section: main
        channel: CBL
        track_id: cbl
        kind: curve
        label: CBL Amplitude (CBL) QSLT-B
        style:
          color: "#111111"
          line_width: 0.8
        scale:
          kind: linear
          min: 0
          max: 100
        callouts:
          - depth: 719
            label: CBL
            side: right
            text_x: 0.86
            font_size: 10.5
      - section: main
        channel: VDL
        track_id: vdl
        kind: raster
        label: VDL VariableDensity (VDL) QSLT-B
        profile: vdl
        normalization: auto
        clip_percentiles:
          - 1
          - 99
        waveform_normalization: trace_maxabs
        sample_axis:
          enabled: true
          unit: us
          min: 200
          max: 1200
          source_origin: 40
          source_step: 10
        style:
          colormap: gray_r
        show_raster: true
        raster_alpha: 1.0
        colorbar:
          enabled: true
          position: header
