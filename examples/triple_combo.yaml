name: Triple Combo Example
page:
  size: A4
  orientation: portrait
  continuous: true
  margin_left_mm: 8
  margin_right_mm: 8
  margin_top_mm: 8
  margin_bottom_mm: 8
  header_height_mm: 22
  track_header_height_mm: 9
  footer_height_mm: 10
depth:
  unit: m
  scale: "1:200"
  major_step: 50
  minor_step: 10
header:
  title: Triple Combo
  subtitle: Print-first layout with image-track overlays
  fields:
    - label: Well
      source_key: WELL
    - label: UWI
      source_key: UWI
    - label: Company
      source_key: COMP
footer:
  lines:
    - Generated by wellplot
markers:
  - depth: 1015
    label: Top A
    color: "#3f51b5"
  - depth: 1088
    label: Event B
    color: "#d84315"
zones:
  - top: 1030
    base: 1060
    label: Zone 1
    fill_color: "#eceff1"
    alpha: 0.35
tracks:
  - id: depth
    title: Depth
    kind: depth
    width_mm: 16
    track_header:
      objects:
        - kind: title
          enabled: true
          line_units: 1
        - kind: scale
          enabled: true
          line_units: 1
        - kind: legend
          enabled: false
          reserve_space: true
          line_units: 2
  - id: gr_cali
    title: GR / CALI
    kind: curve
    width_mm: 30
    track_header:
      objects:
        - kind: title
          enabled: true
          line_units: 1
        - kind: scale
          enabled: true
          line_units: 1
        - kind: legend
          enabled: true
          line_units: 2
    x_scale:
      kind: linear
      min: 0
      max: 150
    elements:
      - kind: curve
        channel: GR
        label: GR
        style:
          color: "#2e7d32"
          line_width: 0.8
      - kind: curve
        channel: CALI
        label: CALI
        scale:
          kind: linear
          min: 6
          max: 16
        style:
          color: "#111111"
          line_width: 0.6
  - id: resistivity
    title: Resistivity
    kind: curve
    width_mm: 30
    track_header:
      objects:
        - kind: title
          enabled: true
          line_units: 1
        - kind: scale
          enabled: true
          line_units: 1
        - kind: legend
          enabled: true
          line_units: 2
    x_scale:
      kind: log
      min: 0.2
      max: 2000
    elements:
      - kind: curve
        channel: RT
        label: RT
        style:
          color: "#d32f2f"
          line_width: 0.8
  - id: density_neutron
    title: RHOB / NPHI
    kind: curve
    width_mm: 30
    track_header:
      objects:
        - kind: title
          enabled: true
          line_units: 1
        - kind: scale
          enabled: true
          line_units: 1
        - kind: legend
          enabled: true
          line_units: 2
    x_scale:
      kind: linear
      min: 1.95
      max: 2.95
    elements:
      - kind: curve
        channel: RHOB
        label: RHOB
        style:
          color: "#3949ab"
          line_width: 0.8
      - kind: curve
        channel: NPHI
        label: NPHI
        scale:
          kind: linear
          min: 0.45
          max: -0.15
        style:
          color: "#fb8c00"
          line_width: 0.8
  - id: image
    title: Image / Overlay
    kind: image
    width_mm: 34
    track_header:
      objects:
        - kind: title
          enabled: true
          line_units: 1
        - kind: scale
          enabled: true
          line_units: 1
        - kind: legend
          enabled: true
          line_units: 2
    x_scale:
      kind: linear
      min: 0
      max: 360
    elements:
      - kind: raster
        channel: FMI
        style:
          colormap: bone
      - kind: curve
        channel: FRACTURE_INTENSITY
        label: Fracture Intensity
        scale:
          kind: linear
          min: 0
          max: 360
        style:
          color: "#c62828"
          line_width: 0.8
