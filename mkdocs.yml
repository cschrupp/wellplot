site_name: wellplot
site_description: User documentation for wellplot
site_url: https://wellplot.readthedocs.io/en/latest/
repo_url: https://github.com/cschrupp/wellplot
repo_name: cschrupp/wellplot
docs_dir: docs/site
site_dir: site

theme:
  name: material
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - content.code.copy
    - search.suggest
    - search.highlight

plugins:
  - search

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - tables
  - toc:
      permalink: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.snippets

extra_javascript:
  - https://unpkg.com/mermaid@10/dist/mermaid.min.js
  - js/mermaid-init.js

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Installation: installation.md
  - Concepts: concepts.md
  - Workflows:
      - YAML Workflow: workflows/yaml-workflow.md
      - Python API Workflow: workflows/python-api.md
      - MCP Workflow: workflows/mcp-workflow.md
      - Rendering: workflows/rendering.md
      - Report Pages: workflows/report-pages.md
      - Release And Publishing: workflows/release-publishing.md
  - Guides:
      - Datasets: guides/datasets.md
      - Examples: guides/examples.md
      - "Example 1: CBL Reconstruction": guides/example-1-cbl-reconstruction.md
      - "Example 2: Porosity Reconstruction": guides/example-2-porosity-reconstruction.md
      - "Example 3: CBL Computed Channels With NumPy": guides/example-3-cbl-computed-numpy.md
      - "Example 4: Porosity Computed Channels With NumPy": guides/example-4-porosity-computed-numpy.md
      - "Example 5: CBL Computed Channels With pandas": guides/example-5-cbl-computed-pandas.md
      - "Example 6: Porosity Computed Channels With pandas": guides/example-6-porosity-computed-pandas.md
  - Reference:
      - Overview: reference/index.md
      - Python API: reference/python-api.md
      - MCP API: reference/mcp-api.md
      - YAML Logfile: reference/logfile-yaml.md
      - Report Pages: reference/report-pages.md
