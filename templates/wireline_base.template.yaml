render:
  backend: matplotlib
  output_path: ../workspace/renders/well_log_render.pdf
  dpi: 300
  matplotlib:
    style:
      track_header:
        background_color: "#e8e8e8"
      track:
        x_tick_labelsize: 6.0
      grid:
        depth_major_linewidth: 0.65
document:
  name: "{WELL} Auto Layout"
  page:
    size: A4
    orientation: portrait
    continuous: true
    margin_left_mm: 0
    margin_right_mm: 8
    margin_top_mm: 8
    margin_bottom_mm: 8
    track_gap_mm: 0
    header_height_mm: 22
    track_header_height_mm: 10
    footer_height_mm: 10
  depth:
    unit: m
    scale: "1:200"
    major_step: 50
    minor_step: 10
  header:
    title: "{WELL}"
    subtitle: "Source: {SOURCE_FILENAME}"
    fields:
      - label: Well
        source_key: WELL
      - label: UWI
        source_key: UWI
      - label: Company
        source_key: COMP
  footer:
    lines:
      - Generated by well_log_os from {SOURCE_FILENAME}
  markers: []
  zones: []
  layout:
    heading:
      enabled: true
    remarks:
      - title: Public Data and IP Notice
        lines:
          - This example uses publicly available or repository-provided demonstration data intended for educational use.
          - Rendered layouts are independent reproductions generated by wellplot, not vendor-authored originals or official service-company deliverables.
          - Original trademarks and service names remain the property of their respective owners.
          - Confirm data provenance and redistribution rights before reusing outputs outside this repository.
        alignment: left
    log_sections:
      - id: main
        title: Main
        subtitle: ""
        tracks:
          - id: depth
            title: Depth
            kind: reference
            width_mm: 16
            position: 1
            reference:
              axis: depth
              define_layout: true
              unit: m
              scale_ratio: 200
              major_step: 50
              secondary_grid:
                display: true
                line_count: 5
              header:
                display_unit: true
                display_scale: true
                display_annotations: true
              number_format:
                format: automatic
                precision: 1
              values_orientation: horizontal
            track_header:
              objects:
                - kind: title
                  enabled: true
                  line_units: 1
                - kind: scale
                  enabled: true
                  line_units: 1
                - kind: legend
                  enabled: false
                  reserve_space: true
                  line_units: 2
    tail:
      enabled: true
  bindings:
    on_missing: skip
    channels: []
